name: callcraft
description: Smart call analysis app for sales professionals
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & Material Design
  cupertino_icons: ^1.0.6

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Navigation
  go_router: ^13.0.0

  # Audio Recording & Playback
  record: ^5.0.4
  just_audio: ^0.9.36
  path_provider: ^2.1.2
  permission_handler: ^11.2.0

  # File Operations
  file_picker: ^6.1.1

  # Local Storage
  sqflite: ^2.3.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # HTTP & API
  http: ^1.2.0
  dio: ^5.4.0

  # JSON Serialization
  json_annotation: ^4.8.1

  # Utilities
  intl: ^0.19.0
  uuid: ^4.3.3
  share_plus: ^7.2.1
  url_launcher: ^6.2.4
  pdf: ^3.10.7
  connectivity_plus: ^5.0.2

  # UI Enhancements
  flutter_slidable: ^3.0.1
  shimmer: ^3.0.0
  lottie: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

  # Code Generation
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true

  # Assets
  # assets:
  #   - assets/images/
  #   - assets/animations/

